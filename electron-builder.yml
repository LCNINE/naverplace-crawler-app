appId: com.naverplace.crawler
productName: NaverPlace Crawler
directories:
  output: dist
  buildResources: resources
asar: true
publish:
  - provider: github
    owner: LCNINE
    repo: naverplace-crawler-app
    releaseType: release
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"
files:
  - "out/**/*"
  - "resources/**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
extraResources:
  - from: "node_modules/playwright-core/.local-browsers"
    to: "playwright-browsers"
    filter: ["**/*"]
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
linux:
  category: Utility
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
