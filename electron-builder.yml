appId: com.naverplace.crawler
productName: NaverPlace Crawler
directories:
  output: dist
  buildResources: resources
asar: true
publish:
  - provider: github
    owner: LCNINE
    repo: naverplace-crawler-app
    releaseType: release
asarUnpack:
  - "node_modules/playwright/**"
  - "node_modules/playwright-core/**"
files:
  - "out/**/*"
  - "resources/**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
# Chromium은 번들하지 않고 사용자 환경에서 첫 실행 시 다운로드한다.
# (인스톨러 ~300MB → ~50MB로 축소, 첫 실행 시 ~150MB 다운로드. ensureChromium in src/main/crawler/core/browser.ts 참조)
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
linux:
  category: Utility
  maintainer: "LCNINE <wndtlr1024@gmail.com>"
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
